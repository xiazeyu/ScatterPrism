# MC-POM detector — hard:
#   momentum smearing (σ = 1.0) + tight cos(θ) cut (0.7) + k10 ≥ 0.3 threshold.

defaults:
  - compose

detectors:
  - _target_: scatterprism.detectors.MomentumSmearing
    sigma: 1.0
  - _target_: scatterprism.detectors.CosThetaCut
    threshold: 0.7
  - _target_: scatterprism.detectors.ValueCut
    column: 'k10'
    min_value: 0.3
    max_value: null
