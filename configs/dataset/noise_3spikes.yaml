# Standard-normal background plus 3 sharp noise spikes (15% noise mass).

defaults:
  - highfreq

base_mean: 0.0
base_std: 1.0

noise_prob: 0.15            # Fraction of samples drawn from the noise peaks
num_noise_peaks: 3
noise_std: 0.17             # Width of each noise peak
noise_range: [-3.0, 3.0]    # Interval over which the noise peaks are scattered
