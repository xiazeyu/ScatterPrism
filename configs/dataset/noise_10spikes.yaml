# Broad Gaussian background plus 10 sharp noise spikes (30% noise mass).

defaults:
  - highfreq

base_mean: 0.4
base_std: 2.0

noise_prob: 0.30            # Fraction of samples drawn from the noise peaks
num_noise_peaks: 10
noise_std: 0.15             # Width of each noise peak
noise_range: [-4.0, 4.0]    # Interval over which the noise peaks are scattered
