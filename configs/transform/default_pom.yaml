# Default MC-POM transform: 4-particle representation, redundant-channel
# reduction, then standard scaling (auto-fitted mean/std, scale-factor 5).

defaults:
  - compose

transforms:
  - _target_: scatterprism.transforms.FourParticleRepresentation
  - _target_: scatterprism.transforms.ReduceRedundantv1
  - _target_: scatterprism.transforms.StandardScaler
    mean: null
    std: null
    scale: 5.0
