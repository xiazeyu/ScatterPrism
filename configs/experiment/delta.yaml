# @package _global_
#
# Delta-function generation experiment.
# Train a CFM (ResNet backbone) on the degenerate delta distribution to
# probe the model's behaviour at a point-mass target.

defaults:
  - override /model: cfm
  - override /dataset: delta
  - override /detector: identity
  - override /transform: standard_scaler
  - _self_

experiment:
  name: cfm_delta

mode: TRAIN
predict: true
predict_best_only: true
save_samples: all

trainer:
  epochs: 1000
  log_interval: 10
  val_interval: 10

model:
  hidden_dims: [512, 512, 512, 512, 512, 512]
  sigma: 0.0
  solver: dopri5
  network_type: resnet
  activation: silu
  norm: null
  time_embed_dim: 64
  learning_rate: 1e-4
  scheduler_patience: 50
  solver_atol: 1e-7
  solver_rtol: 1e-7
  metric_sample_size: 1000000

dataset:
  sample_num: 8000000
  batch_size: 20000
