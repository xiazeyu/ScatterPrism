# @package _global_
#
# MC-POM denoising experiment.
# Train a conditional CFM (ResNet backbone) on paired MC-POM data with an
# MC-POM smearing detector; the model learns to invert detector smearing.
# Default detector preset is sigma=0.5; sweep `detector=mcpom_sigma_0.5,mcpom_sigma_1.0,mcpom_sigma_2.0`
# for the JINST paper's three smearing strengths.

defaults:
  - override /model: cfm
  - override /dataset: paired_mcpom
  - override /detector: mcpom_sigma_0.5
  - override /transform: default_pom
  - _self_

experiment:
  name: cfm_mcpom_denoise
  description: Conditional CFM/ResNet trained on paired MC-POM data (denoising task).

mode: TRAIN
predict: true
predict_best_only: true
save_samples: all

trainer:
  epochs: 1000
  log_interval: 10
  val_interval: 10

model:
  hidden_dims: [512, 512, 512, 512, 512, 512]
  sigma: 0.0
  solver: dopri5
  network_type: resnet
  activation: silu
  norm: null
  time_embed_dim: 64
  learning_rate: 1e-4
  scheduler_patience: 50
  solver_atol: 1e-3
  solver_rtol: 1e-3
  metric_sample_size: 1000000
  conditional: true
  cond_embed_dim: 128

dataset:
  sample_num: 8000000
  batch_size: 20000
