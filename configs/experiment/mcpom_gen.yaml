# @package _global_
#
# MC-POM generation experiment (default channel set).
# Train a CFM (ResNet backbone) on unpaired MC-POM particle-level data.

defaults:
  - override /model: cfm
  - override /dataset: single_mcpom
  - override /detector: identity
  - override /transform: default_pom
  - _self_

experiment:
  name: cfm_mcpom_gen
  description: CFM/ResNet trained on MC-POM particle-level data (generation task).

mode: TRAIN
predict: true
predict_best_only: true
save_samples: all

trainer:
  epochs: 1000
  log_interval: 10
  val_interval: 10

model:
  hidden_dims: [512, 512, 512, 512, 512, 512]
  sigma: 0.0
  solver: dopri5
  network_type: resnet
  activation: silu
  norm: null
  time_embed_dim: 64
  learning_rate: 1e-4
  scheduler_patience: 50
  solver_atol: 1e-7
  solver_rtol: 1e-7
  metric_sample_size: 1000000

dataset:
  sample_num: 8000000
  batch_size: 20000
